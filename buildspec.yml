version: 0.2

env:
  variables:
    DOCKER_REGISTRY_USERNAME: "your-username"
    DOCKER_REGISTRY_PASSWORD: "your-password"
    DOCKER_REGISTRY_URL: "https://index.docker.io/v1/"

  # If you want to pull from Parameter Store instead of hardcoding:
  # parameter-store:
  #   DOCKER_REGISTRY_USERNAME: "/myapp/docker-credentials/username"
  #   DOCKER_REGISTRY_PASSWORD: "/myapp/docker-credentials/password"
  #   DOCKER_REGISTRY_URL: "/myapp/docker-registry/url"

phases:
  pre_build:
    commands:
      - echo "Logging in to Docker registry..."
      - echo $DOCKER_REGISTRY_PASSWORD | docker login $DOCKER_REGISTRY_URL -u $DOCKER_REGISTRY_USERNAME --password-stdin
      - echo "Building Docker image..."
      - docker build -t pro1 .


  post_build:
    commands:
      - echo "Tagging image for Docker Hub..."
      - docker tag pro1 harit-hubgit/brain-tasks-app:latest
      - echo "Pushing image to Docker Hub..."
      - docker push harit-hubgit/brain-tasks-app:latest

artifacts:
  files:
    - '**/*'
  base-directory: Brain-Tasks-app
