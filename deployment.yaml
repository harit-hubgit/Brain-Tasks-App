# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: haritdockerhub/brain-tasks-app
  template:
    metadata:
      labels:
        app: haritdockerhub/brain-tasks-app
    spec:
      containers:
      - name: project1
        image: nginx
        ports:
        - containerPort: 80
